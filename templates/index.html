<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection System</title>

    <!-- ⚡ Faster Font Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
        }

        .container-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }

        .title {
            text-align: center;
            font-weight: 600;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #cfcfcf;
            margin-bottom: 25px;
            font-size: 15px;
        }

        label {
            font-weight: 500;
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            border: none;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 10px rgba(0,198,255,0.8);
            transform: scale(1.02);
        }

        .btn-custom {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 18px;
            color: white;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.5);
        }

        .result-box {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.5s ease-in-out;
        }

        .safe {
            background: linear-gradient(135deg, rgba(0,255,150,0.2), rgba(0,200,100,0.2));
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .fraud {
            background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(200,0,0,0.2));
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner-border {
            color: #00c6ff;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="container-box">

        <h2 class="title">💳 Fraud Detection System</h2>
        <p class="subtitle">AI-Powered Secure Transaction Analysis</p>

        <form action="/predict" method="post" onsubmit="showLoader()">
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Transaction Type</label>
                    <select name="type" class="form-select" required>
                        <option value="">Select Type</option>
                        <option>PAYMENT</option>
                        <option>TRANSFER</option>
                        <option>CASH_OUT</option>
                        <option>DEPOSIT</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Amount</label>
                    <input type="number" step="any" name="amount" placeholder="Enter amount..." class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Old Balance (Sender)</label>
                    <input type="number" step="any" name="oldbalanceOrg" placeholder="Sender old balance" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>New Balance (Sender)</label>
                    <input type="number" step="any" name="newbalanceOrig" placeholder="Sender new balance" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Old Balance (Receiver)</label>
                    <input type="number" step="any" name="oldbalanceDest" placeholder="Receiver old balance" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>New Balance (Receiver)</label>
                    <input type="number" step="any" name="newbalanceDest" placeholder="Receiver new balance" class="form-control" required>
                </div>

            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom">
                    🔍 Analyze Transaction
                </button>
            </div>

            <!-- Loader -->
            <div class="loader" id="loader">
                <div class="spinner-border" role="status"></div>
                <p>Analyzing transaction...</p>
            </div>

        </form>

        <!-- RESULT -->
        {% if prediction_text %}

            {% if prediction == "Fraud" %}
                <div class="result-box fraud">
                    <h4>🚨 {{ prediction_text }}</h4>
            {% else %}
                <div class="result-box safe">
                    <h4>✅ {{ prediction_text }}</h4>
            {% endif %}

                <p style="font-size:18px; font-weight:600;">
                    Fraud Probability: {{ probability }}
                </p>

            </div>

        {% endif %}

    </div>
</div>

<script>
    function showLoader() {
        document.getElementById("loader").style.display = "block";
    }
</script>

</body>
</html>
